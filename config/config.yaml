data:
  tickers: ["SPY", "EEM", "GLD", "TLT", "DBC"]
  start_date: "2006-01-03"
  end_date: "2025-12-31"

volatility:
  garch_p: 1
  garch_q: 1

topology:
  window: 250
  step: 1
  embed_dim: 5
  pca_dim: 10
  min_persist: 1.0e-6
  n_landscapes: 3
  grid_points: 30
  grid_quantile: 0.95
  n_jobs: -1

models:
  baseline:
    n_iter: 500
    lr: 0.01
  topo:
    n_iter: 500
    lr: 0.01
  topo_reg:
    n_iter: 500
    lr: 0.01
    lambda_grid: [0.0, 1.0e-4, 1.0e-3, 1.0e-2, 5.0e-2, 1.0e-1, 5.0e-1]
  encoder_hidden: 64
  encoder_layers: 2
  epsilon: 1.0e-4

evaluation:
  test_size: 0.2
  horizons: [1, 5, 22]
  loss: ["MSE", "QLIKE"]

#PATHS TO RESULTS
paths:
  prices: data/processed/prices.parquet
  log_returns: data/processed/log_returns.parquet
  garch_residuals: data/processed/garch_residuals.parquet
  tda_features_landscape: data/processed/tda_features_landscape.parquet
  tda_features_lpnorm: data/processed/tda_features_lpnorm.parquet 
  tda_features_pi: data/processed/tda_features_pi.parquet
  dcc_baseline: data/processed/dcc_baseline_results.npy
  dcc_topo: data/processed/dcc_topo_results_pi.npy
  dcc_topo_lpnorm: data/processed/dcc_topo_lpnorm_results.npy
  dcc_topo_reg: data/processed/dcc_topo_reg_results.npy
  pca_h0: data/processed/pca_h0.pkl
  pca_h1: data/processed/pca_h1.pkl
  landscape_grid: data/processed/landscape_grid.npy
  permutation_test: data/processed/permutation_test_results.npy        # already there
  permutation_test_lpnorm: data/processed/permutation_test_lpnorm_results.npy   # add this
